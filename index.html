<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishwa Mini WhatsApp Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

/* ANIMATED GRADIENT */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* FLOATING GLOW BALLS */
.glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.6;
    animation: float 10s infinite ease-in-out;
}

.glow:nth-child(1) {
    width: 300px;
    height: 300px;
    background: #ff00ff;
    top: 10%;
    left: 10%;
}

.glow:nth-child(2) {
    width: 250px;
    height: 250px;
    background: #00ffff;
    bottom: 10%;
    right: 15%;
}

.glow:nth-child(3) {
    width: 200px;
    height: 200px;
    background: #ffff00;
    top: 50%;
    left: 50%;
}

@keyframes float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-50px); }
}

/* TITLE */
h1 {
    margin-top: 60px;
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    color: #fff;
    text-shadow: 0 0 15px #00ffff;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 15px 35px;
    margin: 20px;
    font-size: 18px;
    border-radius: 15px;
    text-decoration: none;
    color: white;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.2);

    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #00ffff;
}

/* LIVE USERS */
#liveUsersBox {
    position: fixed;
    top: 20px;
    right: 20px;

    padding: 10px 15px;
    border-radius: 10px;

    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);

    color: #00ffff;
    box-shadow: 0 0 15px #00ffff;
}

/* FEATURES */
.features-box {
    margin: 40px auto;
    width: 85%;
    max-width: 600px;

    padding: 20px;
    border-radius: 15px;

    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);

    box-shadow: 0 0 20px #00ffff;
    text-align: left;
}

.features-box h2 {
    text-align: center;
    color: #00ffff;
}

.features-box li {
    padding: 6px 0;
}
</style>
</head>

<body>

<!-- GLOW BACKGROUND -->
<div class="glow"></div>
<div class="glow"></div>
<div class="glow"></div>

<!-- LIVE USERS -->
<div id="liveUsersBox">
👥 Online: <span id="userCount">0</span>
</div>

<h1>Vishwa Mini WhatsApp Bot</h1>

<a href="#" class="btn">🚀 DEPLOY BOT</a>
<br>
<a href="#" class="btn">💬 WhatsApp Channel</a>

<div class="features-box">
<h2>⚙️ Bot Features</h2>
<ul>
<li>✔️ Advanced Command System</li>
<li>✔️ Smart Auto Reply</li>
<li>✔️ Group Management Tools</li>
<li>✔️ Fun & Media Commands</li>
<li>✔️ AI Integration</li>
<li>✔️ Full Custom Settings</li>
</ul>
</div>

<script>
// fake users
let count = Math.floor(Math.random() * 20) + 5;

setInterval(() => {
    count += Math.random() > 0.5 ? 1 : -1;
    if (count < 5) count = 5;
    if (count > 50) count = 50;

    document.getElementById("userCount").innerText = count;
}, 2000);
</script>

</body>
</html>
