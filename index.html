<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishwa Mini WhatsApp Bot</title>

<!-- Hacker Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* TITLE */
h1 {
    position: relative;
    z-index: 2;
    margin-top: 60px;
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #00ffcc;
    text-shadow: 
        0 0 5px #00ffcc,
        0 0 10px #00ffcc,
        0 0 20px #00ffcc;
}

/* BUTTON BASE */
.btn {
    position: relative;
    z-index: 2;
    display: inline-block;
    padding: 15px 35px;
    margin: 20px;
    font-size: 18px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    overflow: hidden;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.4s;
}

/* Glow border */
.btn::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 12px;
    background: linear-gradient(45deg, #00ffcc, #2563eb, #22c55e, #00ffcc);
    background-size: 300%;
    animation: glowMove 6s linear infinite;
    z-index: -1;
}

@keyframes glowMove {
    0% { background-position: 0% }
    100% { background-position: 300% }
}

/* Inner layer */
.btn::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: rgba(0,0,0,0.9);
    border-radius: 10px;
    z-index: -1;
}

/* Hover */
.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #00ffcc;
}

/* Click */
.btn:active {
    transform: scale(0.95);
}

.pair-btn:hover {
    box-shadow: 0 0 30px #2563eb;
}

.whatsapp-btn:hover {
    box-shadow: 0 0 30px #22c55e;
}

/* Canvas */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<h1>Vishwa Mini WhatsApp Bot</h1>

<a href="https://vishwa-mini-production-52bd.up.railway.app/" 
   class="btn pair-btn" target="_blank">
   ⚡ Pair Code
</a>

<br>

<a href="https://whatsapp.com/channel/0029VbCkMcxHbFV9OGiwZM30" 
   class="btn whatsapp-btn" target="_blank">
   💬 WhatsApp Channel
</a>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 16;
const columns = Math.floor(canvas.width / fontSize);

const drops = Array(columns).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff99";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));

        ctx.shadowColor = "#00ff99";
        ctx.shadowBlur = 8;

        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.97) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 30);

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
