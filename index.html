
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishwa Mini WhatsApp Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ==== (UNCHANGED STYLES - SAME AS YOUR ORIGINAL) ==== */
body {
  font-family: 'DM Sans', sans-serif;
  background: #080e12;
  color: #e8f4f2;
  text-align: center;
  padding: 40px;
}

/* SIMPLE CLEAN VERSION (kept lightweight) */
.container {
  max-width: 500px;
  margin: auto;
  background: rgba(13,26,32,0.85);
  padding: 30px;
  border-radius: 16px;
  border: 1px solid rgba(0,229,195,0.2);
}

h1 {
  font-family: 'Syne', sans-serif;
  color: #00e5c3;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  border: 1px solid rgba(0,229,195,0.3);
  background: transparent;
  color: white;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#00e5c3,#00b4c8);
  cursor: pointer;
  font-weight: bold;
}

.code-box {
  margin-top: 25px;
  font-size: 28px;
  letter-spacing: 6px;
  color: #00e5c3;
}

.error {
  color: #ff6b6b;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🚀 Vishwa Mini Bot</h1>
  <p>Enter your WhatsApp number</p>

  <input type="text" id="phoneInput" placeholder="94771234567">

  <button onclick="requestCode()">Get Pair Code</button>

  <div id="errorMsg" class="error"></div>

  <div id="codeBox" class="code-box"></div>
</div>

<script>
const API_BASE = 'https://vishwa-mini-5b145ff48e9e.herokuapp.com';

async function requestCode() {
  const input = document.getElementById('phoneInput');
  const error = document.getElementById('errorMsg');
  const codeBox = document.getElementById('codeBox');

  const raw = input.value.trim().replace(/\D/g, '');

  if (raw.length < 7) {
    error.textContent = "Invalid number";
    return;
  }

  error.textContent = "";
  codeBox.textContent = "Loading...";

  try {
    // ✅ FIXED PAIR ENDPOINT
    const res = await fetch(`${API_BASE}/pair?number=${raw}`);

    if (!res.ok) throw new Error("API error");

    const data = await res.json();

    const code = data.code || data.pair;

    if (!code) throw new Error("No code");

    showCode(code);

  } catch (err) {
    error.textContent = "Failed to get code";
    codeBox.textContent = "";
    console.error(err);
  }
}

function showCode(code) {
  const clean = code.replace(/[^a-zA-Z0-9]/g, '');
  const chunkSize = Math.ceil(clean.length / 4);

  let formatted = '';
  for (let i = 0; i < 4; i++) {
    formatted += clean.slice(i * chunkSize, (i + 1) * chunkSize) + ' ';
  }

  document.getElementById('codeBox').textContent = formatted;
}
</script>

</body>
</html>
