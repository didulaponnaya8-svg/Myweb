<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Pair Code</title>

<style>
body {
  font-family: Arial;
  background: #0d1a20;
  color: white;
  text-align: center;
  padding: 40px;
}

input {
  padding: 12px;
  font-size: 16px;
  width: 220px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  background: #00e5c3;
  border: none;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#codeBox {
  margin-top: 30px;
  font-size: 28px;
  letter-spacing: 6px;
  color: #00e5c3;
}

#copyBtn {
  display: none;
  background: #00b4c8;
}

#msg {
  margin-top: 10px;
  color: #00e5c3;
}

#error {
  color: red;
}
</style>
</head>

<body>

<h2>WhatsApp Pair Code</h2>

<input type="text" id="num" placeholder="9477XXXXXXX">
<br>
<button id="getBtn" onclick="getCode()">Get Code</button>

<div id="error"></div>

<div id="codeBox"></div>

<button id="copyBtn" onclick="copyCode()">📋 Copy Code</button>

<div id="msg"></div>

<script>
const API = "https://vishwa-mini-5b145ff48e9e.herokuapp.com";

let currentCode = "";
let timer = null;
let cooldown = false;

// GET CODE
async function getCode() {
  const num = document.getElementById("num").value.trim();
  const err = document.getElementById("error");
  const box = document.getElementById("codeBox");

  if (cooldown) {
    err.innerText = "⏳ Wait 30 seconds before getting new code";
    return;
  }

  err.innerText = "";
  box.innerText = "Loading...";

  if (num.length < 7) {
    err.innerText = "Invalid number";
    box.innerText = "";
    return;
  }

  try {
    const res = await fetch(API + "/code?number=" + num);
    const data = await res.json();

    if (!data.code) throw new Error();

    showCode(data.code);

  } catch (e) {
    err.innerText = "Failed to get code";
    box.innerText = "";
  }
}

// SHOW CODE
function showCode(code) {
  const box = document.getElementById("codeBox");
  const copyBtn = document.getElementById("copyBtn");

  const clean = code.replace(/[^a-zA-Z0-9]/g, '');
  const fixed = clean.padEnd(8, '-').slice(0, 8);

  currentCode =
    fixed.slice(0,2) + "-" +
    fixed.slice(2,4) + "-" +
    fixed.slice(4,6) + "-" +
    fixed.slice(6,8);

  box.innerText = currentCode;
  copyBtn.style.display = "inline-block";

  // 60s expiry timer
  let sec = 60;
  clearInterval(timer);

  timer = setInterval(() => {
    sec--;
    box.innerText = currentCode + " (" + sec + "s)";
    if (sec <= 0) {
      clearInterval(timer);
      box.innerText = "Expired. Try again.";
      copyBtn.style.display = "none";
    }
  }, 1000);
}

// COPY + 30s LOCK
function copyCode() {
  navigator.clipboard.writeText(currentCode);

  const msg = document.getElementById("msg");
  const copyBtn = document.getElementById("copyBtn");
  const getBtn = document.getElementById("getBtn");

  msg.innerText = "✅ Copied!";

  // start cooldown
  cooldown = true;
  let sec = 30;

  copyBtn.disabled = true;
  getBtn.disabled = true;

  const interval = setInterval(() => {
    sec--;
    msg.innerText = "⏳ Wait " + sec + "s to get new code";

    if (sec <= 0) {
      clearInterval(interval);
      cooldown = false;
      copyBtn.disabled = false;
      getBtn.disabled = false;
      msg.innerText = "✅ You can get a new code now";
    }
  }, 1000);
}
</script>

</body>
</html>
